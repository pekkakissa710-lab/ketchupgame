<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker</title>
    <link rel="icon" type="image/png" href="ketchup.png">
    <style>
        :root { --deep-red: #b30000; --bright-red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
        
        body {
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: default;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #main-wrapper { display: flex; flex-direction: column; align-items: center; transition: filter 0.3s ease; }
        .blurred { filter: blur(15px); }

        #counter { font-size: 8rem; font-weight: 900; color: white; text-shadow: 4px 4px var(--deep-red); line-height: 1; }
        #stats { color: white; font-weight: bold; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; }

        #ketchup-btn { width: 280px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4)); margin-top: 20px; }
        #ketchup-btn:active { transform: scale(0.92) rotate(-3deg); }

        /* Shop Area */
        #shop {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; width: 260px;
        }

        .upgrade-card {
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            color: white; cursor: pointer; transition: 0.2s;
        }

        .upgrade-card:hover { background: rgba(0, 0, 0, 0.5); transform: scale(1.05); }
        .upgrade-card h3 { font-size: 1.1rem; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .price { font-weight: bold; color: #44ff44; font-family: monospace; font-size: 1.1rem; }

        #info { position: fixed; top: 20px; left: 20px; color: white; opacity: 0.5; font-size: 0.8rem; }
        #delete-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 20px; z-index: 1100; text-align: center; border: 5px solid var(--deep-red); }
        
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--bright-red); color: white; margin-top: 10px; }
        .splat { position: absolute; pointer-events: none; background: var(--bright-red); border-radius: 50%; animation: fly 0.5s forwards; z-index: 10; }
        @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="info">RIGHT SHIFT = DELETE DATA</div>

    <div id="main-wrapper">
        <div id="stats">
            CLICK: +<span id="click-val">1</span> | AUTO: +<span id="cps-val">0</span>/s
        </div>
        <div id="ui"><span id="counter">0</span></div>
        <img src="ketchup.png" id="ketchup-btn" alt="Ketchup">
    </div>

    <div id="shop">
        <div class="upgrade-card" onclick="buy('click')">
            <h3>Click Multiplier</h3>
            <span class="price" id="click-price">Cost: 15</span>
        </div>
        
        <div class="upgrade-card" onclick="buy('auto')">
            <h3>Auto Multiplier</h3>
            <span class="price" id="auto-price">Cost: 100</span>
        </div>
    </div>

    <div id="delete-menu">
        <h2 style="margin-bottom:1rem">HARD RESET?</h2>
        <button class="action-btn" onclick="hardReset()">DELETE EVERYTHING</button>
        <button class="action-btn" style="background:#888" onclick="closeMenu()">CANCEL</button>
    </div>

    <script>
        // Data management
        let data = JSON.parse(localStorage.getItem('ketchup_save')) || {
            score: 0,
            clickPower: 1,
            autoPower: 0,
            clickCost: 15,
            autoCost: 100
        };

        const counterEl = document.getElementById('counter');
        const clickValEl = document.getElementById('click-val');
        const cpsValEl = document.getElementById('cps-val');
        const clickPriceEl = document.getElementById('click-price');
        const autoPriceEl = document.getElementById('auto-price');

        function update() {
            counterEl.innerText = Math.floor(data.score);
            clickValEl.innerText = data.clickPower;
            cpsValEl.innerText = data.autoPower;
            clickPriceEl.innerText = `Cost: ${data.clickCost}`;
            autoPriceEl.innerText = `Cost: ${data.autoCost}`;
            localStorage.setItem('ketchup_save', JSON.stringify(data));
        }

        // Main Click
        document.getElementById('ketchup-btn').onclick = (e) => {
            data.score += data.clickPower;
            update();
            spawnSplat(e.clientX, e.clientY);
        };

        // Shop Logic
        function buy(type) {
            if (type === 'click' && data.score >= data.clickCost) {
                data.score -= data.clickCost;
                data.clickPower++;
                data.clickCost = Math.floor(data.clickCost * 1.6);
            } else if (type === 'auto' && data.score >= data.autoCost) {
                data.score -= data.autoCost;
                data.autoPower++;
                data.autoCost = Math.floor(data.autoCost * 1.8);
            }
            update();
        }

        // Auto generation
        setInterval(() => {
            if (data.autoPower > 0) {
                data.score += (data.autoPower / 10); // Updated 10 times a second for smoothness
                update();
            }
        }, 100);

        function spawnSplat(x, y) {
            for(let i=0; i<6; i++) {
                const s = document.createElement('div');
                s.className = 'splat';
                s.style.left = x + 'px'; s.style.top = y + 'px';
                s.style.width = s.style.height = (Math.random()*12+4)+'px';
                s.style.setProperty('--x', (Math.random()-0.5)*300+'px');
                s.style.setProperty('--y', (Math.random()-0.5)*300+'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 500);
            }
        }

        // Controls
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.code === "ShiftRight") {
                document.getElementById('delete-menu').style.display = "block";
                document.getElementById('main-wrapper').classList.add('blurred');
            }
            if (e.key === "Escape") closeMenu();
        });

        function closeMenu() {
            document.getElementById('delete-menu').style.display = "none";
            document.getElementById('main-wrapper').classList.remove('blurred');
        }

        function hardReset() {
            localStorage.removeItem('ketchup_save');
            location.reload();
        }

        update();
    </script>
</body>
</html>
