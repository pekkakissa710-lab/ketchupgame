<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker - User System</title>
    <link rel="icon" type="image/png" href="ketchup.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --deep-red: #b30000; --bright-red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
        
        body {
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: default;
        }

        #main-wrapper { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: filter 0.3s ease; }
        .blurred { filter: blur(15px); }

        /* Auth UI */
        #auth-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: white; padding: 2rem; border-radius: 20px; text-align: center; width: 350px; border: 5px solid var(--deep-red); }
        .auth-tabs { display: flex; margin-bottom: 1rem; gap: 5px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: var(--bright-red); color: white; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 2px solid #ddd; outline: none; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--bright-red); color: white; margin-top: 10px; }
        
        /* Game UI */
        #counter { font-size: 8rem; font-weight: 900; color: white; text-shadow: 4px 4px var(--deep-red); }
        #ketchup-btn { width: 280px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4)); }
        #ketchup-btn:active { transform: scale(0.9) rotate(-5deg); }
        #leaderboard { position: fixed; left: 20px; top: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 1rem; border-radius: 15px; color: white; width: 220px; border: 1px solid rgba(255,255,255,0.2); }
        #info { position: fixed; top: 20px; right: 20px; color: white; opacity: 0.6; font-weight: bold; }

        #delete-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 20px; z-index: 1100; text-align: center; border: 4px solid var(--deep-red); }
        .splat { position: absolute; pointer-events: none; background: var(--bright-red); border-radius: 50%; animation: fly 0.6s forwards; z-index: 10; }
        @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color: var(--deep-red); margin-bottom: 1rem;">KETCHUPPI</h2>
            <div class="auth-tabs">
                <div id="tab-login" class="tab-btn active" onclick="switchTab('login')">Login</div>
                <div id="tab-register" class="tab-btn" onclick="switchTab('register')">Register</div>
            </div>
            
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="pass1" placeholder="Password">
            <input type="password" id="pass2" placeholder="Confirm Password" style="display: none;">
            
            <button id="auth-submit" class="action-btn" onclick="handleAuth()">Login</button>
            <p id="auth-msg" style="font-size: 0.8rem; margin-top: 10px; color: red;"></p>
        </div>
    </div>

    <div id="info">Right Shift = Reset</div>
    <div id="leaderboard">
        <h3 style="border-bottom: 1px solid red; margin-bottom: 10px;">Top 5 Players</h3>
        <div id="lb-list">Loading...</div>
    </div>

    <div id="main-wrapper">
        <div id="ui"><span id="counter">0</span></div>
        <img src="ketchup.png" id="ketchup-btn" alt="Ketchup">
    </div>

    <div id="delete-menu">
        <h3>Reset Ketchup?</h3>
        <button class="action-btn" onclick="resetData()">YES</button>
        <button class="action-btn" style="background:#ccc" onclick="closeMenu()">NO</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://drjymjtukbirohklftsk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wO1HyTNhV4uwzC4Ng39Fng_dTRxzHSx';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'login';
        let currentUser = null;
        let count = 0;

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('pass2').style.display = (tab === 'register') ? 'block' : 'none';
            document.getElementById('auth-submit').innerText = (tab === 'register') ? 'Create Account' : 'Login';
            document.getElementById('auth-msg').innerText = '';
        }

        async function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('auth-msg');

            if (!user || !p1) return msg.innerText = "Fill all fields!";
            const fakeEmail = `${user}@ketchup.com`;

            if (currentTab === 'register') {
                if (p1 !== p2) return msg.innerText = "Passwords don't match!";
                const { data, error } = await supabase.auth.signUp({ 
                    email: fakeEmail, password: p1, options: { data: { username: user } } 
                });
                if (error) return msg.innerText = error.message;
                alert("Account created! Now login.");
                switchTab('login');
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email: fakeEmail, password: p1 });
                if (error) return msg.innerText = "Wrong username or password!";
                currentUser = data.user;
                initGame();
            }
        }

        async function initGame() {
            const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) count = data.ketchup_count;
            document.getElementById('counter').innerText = count;
            document.getElementById('auth-screen').style.display = 'none';
            updateLeaderboard();
            setInterval(saveToCloud, 5000);
        }

        document.getElementById('ketchup-btn').onclick = (e) => {
            if (!currentUser) return;
            count++;
            document.getElementById('counter').innerText = count;
            for(let i=0; i<6; i++) {
                const s = document.createElement('div');
                s.className = 'splat';
                s.style.left = e.clientX+'px'; s.style.top = e.clientY+'px';
                s.style.width = s.style.height = (Math.random()*15+5)+'px';
                s.style.setProperty('--x', (Math.random()-0.5)*300+'px');
                s.style.setProperty('--y', (Math.random()-0.5)*300+'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 600);
            }
        };

        async function saveToCloud() {
            if (currentUser) {
                await supabase.from('profiles').update({ ketchup_count: count }).eq('id', currentUser.id);
                updateLeaderboard();
            }
        }

        async function updateLeaderboard() {
            const { data } = await supabase.from('profiles').select('username, ketchup_count').order('ketchup_count', { ascending: false }).limit(5);
            if (data) {
                document.getElementById('lb-list').innerHTML = data.map((p, i) => 
                    `<div style="font-size:0.9rem; margin-bottom:3px;">${i+1}. ${p.username || 'Anon'}: ${p.ketchup_count}</div>`
                ).join('');
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.code === "ShiftRight") {
                document.getElementById('delete-menu').style.display = "block";
                document.getElementById('main-wrapper').classList.add('blurred');
            }
            if (e.keyCode === 27) closeMenu();
        });

        function closeMenu() {
            document.getElementById('delete-menu').style.display = "none";
            document.getElementById('main-wrapper').classList.remove('blurred');
        }

        async function resetData() {
            count = 0; document.getElementById('counter').innerText = 0;
            await saveToCloud(); closeMenu();
        }
    </script>
</body>
</html>
