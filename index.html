<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker</title>
    <style>
        :root {
            --deep-red: #b30000;
            --bright-red: #ff0000;
            --sky-blue: #87CEEB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            cursor: default;
        }

        /* Information text in the top right corner */
        #info-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        #ui {
            text-align: center;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        #counter {
            font-size: 8rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            text-shadow: 4px 4px 0px var(--deep-red);
            display: block;
        }

        #label {
            font-size: 1.5rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: bold;
        }

        .container {
            position: relative;
            perspective: 1000px;
        }

        #ketchup-btn {
            width: 280px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        #ketchup-btn:active {
            transform: scale(0.9) rotate(-5deg);
        }

        .splat {
            position: absolute;
            pointer-events: none;
            background: var(--bright-red);
            border-radius: 50%;
            animation: fly 0.6s ease-out forwards;
            z-index: 10;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        /* Delete Menu */
        #delete-menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            border: 4px solid var(--deep-red);
        }

        #delete-menu h2 {
            color: var(--deep-red);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .menu-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .menu-btn:hover { opacity: 0.9; }
        .confirm { background: var(--bright-red); color: white; }
        .cancel { background: #ddd; color: #333; }

    </style>
</head>
<body>

    <div id="info-overlay">Right Shift = Delete Data</div>

    <div id="ui">
        <span id="label">Ketchup Collected</span>
        <span id="counter">0</span>
    </div>

    <div class="container">
        <img src="ketchup.png" id="ketchup-btn" alt="Ketchup Bottle">
    </div>

    <!-- Confirmation Menu -->
    <div id="delete-menu">
        <h2>Reset all progress?</h2>
        <div class="btn-group">
            <button class="menu-btn confirm" onclick="resetData()">Yes, Delete</button>
            <button class="menu-btn cancel" onclick="closeMenu()">No, Keep it</button>
        </div>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('ketchupCount')) || 0;
        const counterDisplay = document.getElementById('counter');
        const btn = document.getElementById('ketchup-btn');
        const deleteMenu = document.getElementById('delete-menu');

        counterDisplay.innerText = count;

        // --- CLICK LOGIC ---
        btn.addEventListener('click', (e) => {
            count++;
            counterDisplay.innerText = count;
            localStorage.setItem('ketchupCount', count);
            createSplats(e.clientX, e.clientY);
        });

        function createSplats(x, y) {
            for (let i = 0; i < 8; i++) {
                const splat = document.createElement('div');
                splat.classList.add('splat');
                const size = Math.random() * 15 + 5 + 'px';
                splat.style.width = size;
                splat.style.height = size;
                const moveX = (Math.random() - 0.5) * 350 + 'px';
                const moveY = (Math.random() - 0.5) * 350 + 'px';
                splat.style.setProperty('--x', moveX);
                splat.style.setProperty('--y', moveY);
                splat.style.left = x + 'px';
                splat.style.top = y + 'px';
                document.body.appendChild(splat);
                setTimeout(() => splat.remove(), 600);
            }
        }

        // --- ANTI-TAMPER / RESTRICTIONS ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        btn.ondragstart = () => false;

        document.addEventListener('keydown', (e) => {
            // Block Inspect, View Source, Save, etc.
            if (e.ctrlKey && (e.keyCode === 65 || e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83) || 
                e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
                e.preventDefault();
            }

            // RIGHT SHIFT opens delete menu
            if (e.code === "ShiftRight") {
                deleteMenu.style.display = "block";
            }
            
            // ESC closes menu
            if (e.keyCode === 27) {
                closeMenu();
            }
        });

        // --- MENU ACTIONS ---
        function closeMenu() {
            deleteMenu.style.display = "none";
        }

        function resetData() {
            count = 0;
            localStorage.setItem('ketchupCount', 0);
            counterDisplay.innerText = 0;
            closeMenu();
        }
    </script>
</body>
</html>
