<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ketchup Runner</title>
    <link rel="icon" type="image/png" href="ketchup.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { 
            user-select: none; -webkit-user-select: none; 
            touch-action: none; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Fredoka One', cursive; }
        
        .blur-target { transition: filter 0.3s ease; }
        .paused-blur .blur-target { filter: blur(8px); }

        .overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: white; background: #ff4747;
            -webkit-text-stroke: 2px black;
        }

        /* Blur vain kuollessa ja pausessa */
        #gameover, #pause-menu {
            background: rgba(255, 71, 71, 0.6) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        h1 { font-size: clamp(30px, 8vw, 60px); margin-bottom: 20px; text-align: center; }
        
        .menu-btn { 
            font-size: 18px; padding: 12px 30px; margin: 8px;
            background: white; color: #ff4747; border: 3px solid black; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 0px #000; font-family: 'Fredoka One';
            -webkit-text-stroke: 1px black; transition: all 0.1s;
        }
        .menu-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: none; }
        .menu-btn:disabled { opacity: 0.5; }

        .diff-btn.selected { background: #ffd700 !important; color: white !important; }

        .back-arrow {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px; background: white;
            border: 3px solid black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #ff4747; font-size: 30px; cursor: pointer;
            box-shadow: 0 4px 0px #000; z-index: 100; -webkit-text-stroke: 2px black;
        }

        .runs-container { 
            width: 95%; max-width: 450px; 
            background: rgba(0,0,0,0.4); 
            padding: 20px; border: 4px solid black; border-radius: 20px; 
            -webkit-text-stroke: 1px black;
            overflow: hidden;
        }
        .run-item { border-bottom: 2px solid rgba(255,255,255,0.1); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        .run-date { font-size: 12px; color: #ccc; -webkit-text-stroke: 0.5px black; }

        .setting-row { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 320px; margin: 8px; font-size: 18px; 
            background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 20px; border: 2.5px solid black;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px; border: 2px solid black;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%; border: 1.5px solid black;
        }
        input:checked + .slider { background-color: #00ff00; }
        input:checked + .slider:before { transform: translateX(24px); }

        #pause-btn {
            position: absolute; top: 15px; right: 15px;
            width: 50px; height: 50px; background: white;
            border: 3px solid black; border-radius: 12px;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; box-shadow: 0 4px 0 black;
        }

        #ui { 
            position: absolute; top: 15px; left: 15px; color: white; 
            -webkit-text-stroke: 1.2px black; font-size: 22px; z-index: 100; display: none;
        }

        #confirm-menu {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; background: rgba(0,0,0,0.8); 
        }
        #confirm-box {
            background: white; color: #ff4747; padding: 30px; 
            border: 5px solid black; border-radius: 25px; 
            text-align: center; box-shadow: 0 10px 0 #000; width: 85%; max-width: 350px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="game-container" class="blur-target"></div>
    
    <div id="menu" class="overlay">
        <h1>KETCHUP RUNNER</h1>
        <div id="main-btns" style="display: flex; flex-direction: column; align-items: center;">
            <button class="menu-btn" style="background: #00ff00; color: #006400; font-size: 28px; width: 240px;" onclick="toggleDiffs()">PLAY</button>
            <button class="menu-btn" style="width: 240px;" onclick="openSettings()">SETTINGS</button>
            <button class="menu-btn" style="width: 240px; font-size: 16px;" onclick="showBestRuns()">MY BEST RUNS</button>
        </div>

        <div id="diff-selection" class="hidden">
            <div class="back-arrow" onclick="toggleDiffs()"><</div>
            <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 350px; margin-top: 40px;">
                <button class="menu-btn diff-btn" onclick="setDiff('Easy', this)">EASY</button>
                <button class="menu-btn diff-btn" onclick="setDiff('Medium', this)">MEDIUM</button>
                <button class="menu-btn diff-btn" onclick="setDiff('Hard', this)">HARD</button>
                <button class="menu-btn diff-btn" onclick="setDiff('Impossible', this)">IMPO</button>
            </div>
            <div style="display: flex; justify-content: center; width: 100%; margin-top: 20px;">
                <button class="menu-btn" style="background: #00ff00; color: #006400; width: 220px; font-size: 24px;" id="start-confirm" disabled onclick="startGame()">START!</button>
            </div>
        </div>
    </div>

    <div id="settings-menu" class="overlay hidden">
        <div class="back-arrow" onclick="closeSettings()"><</div>
        <h1>SETTINGS</h1>
        <div class="setting-row"><span>FULLSCREEN</span><label class="switch"><input type="checkbox" id="fs-toggle" onchange="toggleFullscreen()"><span class="slider"></span></label></div>
        <div class="setting-row"><span>SHOW FPS</span><label class="switch"><input type="checkbox" id="fps-toggle" onchange="updateSettings()"><span class="slider"></span></label></div>
        <div class="setting-row"><span>FPS LIMIT (60)</span><label class="switch"><input type="checkbox" id="fps-limit" onchange="updateSettings()" checked><span class="slider"></span></label></div>
        <div class="setting-row"><span>SHOW SCORE</span><label class="switch"><input type="checkbox" id="score-toggle" onchange="updateSettings()" checked><span class="slider"></span></label></div>
        <button class="menu-btn" style="width: 250px; margin-top: 30px; background: #000; color: white;" onclick="confirmDeleteAll()">DELETE ALL DATA</button>
    </div>

    <div id="gameover" class="overlay hidden">
        <h1>GAME OVER!</h1>
        <button class="menu-btn" onclick="resetToMenu()">BACK TO MENU</button>
    </div>

    <div id="confirm-menu">
        <div id="confirm-box">
            <p style="font-weight: bold; -webkit-text-stroke: 0px;">Delete all data?</p>
            <button class="menu-btn" style="background: #ff4747; color: white; width: 100px;" onclick="deleteAllData()">YES</button>
            <button class="menu-btn" style="width: 100px; color: #ff4747;" onclick="cancelDeleteAll()">NO</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
        <h1>PAUSED</h1>
        <button class="menu-btn" onclick="resumeGame()">RESUME</button>
        <button class="menu-btn" onclick="resetToMenu()">QUIT</button>
    </div>

    <div id="best-runs-screen" class="overlay hidden">
        <div class="back-arrow" onclick="closeBestRuns()"><</div>
        <h1>TOP 5 RUNS</h1>
        <div class="runs-container" id="full-runs-list"></div>
    </div>

    <div id="ui">
        <span id="score-ui">SCORE: <span id="score">0</span></span> 
        <span id="coin-ui"> | COINS: <span id="coins">0</span></span>
    </div>

    <div id="pause-btn" onclick="pauseGame()">
        <div style="width: 6px; height: 20px; background: black; margin: 2px; border-radius: 2px;"></div>
        <div style="width: 6px; height: 20px; background: black; margin: 2px; border-radius: 2px;"></div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        let score = 0, coins = 0, gameActive = false, isPaused = false;
        let speed = 0.6, spawnRate = 0.04, currentDifficulty = null, targetFPS = 60, lastFrameTime = 0;
        const obstacles = [], coinObjects = [];
        const keys = { left: false, right: false };

        window.toggleFullscreen = () => {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => {}); }
            else { document.exitFullscreen(); }
        };
        document.addEventListener('fullscreenchange', () => {
            const fsToggle = document.getElementById('fs-toggle');
            if (fsToggle) fsToggle.checked = !!document.fullscreenElement;
        });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        scene.background = loader.load('https://img.freepik.com/free-vector/blue-sky-with-white-clouds-background_1017-23434.jpg');
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5,15,10); scene.add(sun);
        
        const roadGroup = new THREE.Group();
        const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 1000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2; roadGroup.add(road);
        for (let i = 0; i < 50; i++) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            line.rotation.x = -Math.PI / 2; line.position.set(0, 0.02, -i * 20); roadGroup.add(line);
        }
        scene.add(roadGroup);

        const player = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 0.6; scene.add(player);
        camera.position.set(0, 5, 9); camera.lookAt(player.position);

        window.pauseGame = () => { if (gameActive) { isPaused = true; document.body.classList.add('paused-blur'); document.getElementById('pause-menu').classList.remove('hidden'); document.getElementById('pause-btn').style.display = 'none'; } };
        window.resumeGame = () => { isPaused = false; document.body.classList.remove('paused-blur'); document.getElementById('pause-menu').classList.add('hidden'); document.getElementById('pause-btn').style.display = 'flex'; requestAnimationFrame(animate); };
        window.resetToMenu = () => { obstacles.forEach(obj => scene.remove(obj)); coinObjects.forEach(obj => scene.remove(obj)); obstacles.length = 0; coinObjects.length = 0; player.position.x = 0; score = 0; coins = 0; gameActive = false; isPaused = false; document.body.classList.remove('paused-blur'); document.getElementById('ui').style.display = 'none'; document.getElementById('pause-btn').style.display = 'none'; document.getElementById('menu').classList.remove('hidden'); document.getElementById('pause-menu').classList.add('hidden'); document.getElementById('gameover').classList.add('hidden'); };
        window.toggleDiffs = () => { document.getElementById('main-btns').classList.toggle('hidden'); document.getElementById('diff-selection').classList.toggle('hidden'); };
        window.setDiff = (level, btn) => { currentDifficulty = level; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('start-confirm').disabled = false; const diffs = { 'Easy': [0.4, 0.02], 'Medium': [0.6, 0.04], 'Hard': [1.0, 0.08], 'Impossible': [1.6, 0.18] }; [speed, spawnRate] = diffs[level]; };
        window.openSettings = () => { document.getElementById('menu').classList.add('hidden'); document.getElementById('settings-menu').classList.remove('hidden'); };
        window.closeSettings = () => { document.getElementById('settings-menu').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); };
        window.showBestRuns = () => { document.getElementById('menu').classList.add('hidden'); document.getElementById('best-runs-screen').classList.remove('hidden'); renderRuns(); };
        window.closeBestRuns = () => { document.getElementById('best-runs-screen').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); };
        window.confirmDeleteAll = () => document.getElementById('confirm-menu').style.display = 'flex';
        window.cancelDeleteAll = () => document.getElementById('confirm-menu').style.display = 'none';
        window.deleteAllData = () => { localStorage.removeItem('ketchup_best'); cancelDeleteAll(); renderRuns(); };

        function renderRuns() {
            const runs = JSON.parse(localStorage.getItem('ketchup_best') || '[]');
            const container = document.getElementById('full-runs-list');
            container.innerHTML = runs.slice(0, 5).map((r, i) => `
                <div class="run-item">
                    <div style="display:flex; flex-direction:column">
                        <span>#${i+1} <b>${r.score}</b></span>
                        <span class="run-date">${r.date} | ${r.time || '--:--'}</span>
                    </div>
                </div>
            `).join('') || "<div style='text-align:center'>No runs yet!</div>";
        }

        window.startGame = () => { document.getElementById('menu').classList.add('hidden'); document.getElementById('ui').style.display = 'block'; document.getElementById('pause-btn').style.display = 'flex'; gameActive = true; requestAnimationFrame(animate); };

        function animate(now) {
            if (!gameActive || isPaused) return;
            requestAnimationFrame(animate);
            const delta = now - lastFrameTime;
            if (delta < (1000 / targetFPS)) return;
            lastFrameTime = now;
            
            if (keys.left && player.position.x > -5) player.position.x -= 0.22;
            if (keys.right && player.position.x < 5) player.position.x += 0.22;
            
            roadGroup.position.z += speed; if (roadGroup.position.z > 20) roadGroup.position.z = 0;
            if (Math.random() < spawnRate) {
                const isCoin = Math.random() < 0.3;
                const obj = new THREE.Mesh(isCoin ? new THREE.CylinderGeometry(0.4,0.4,0.15,16) : new THREE.BoxGeometry(1.6, 1.6, 1.6), new THREE.MeshStandardMaterial({color: isCoin ? 0xffd700 : 0xffdb00}));
                if(isCoin) obj.rotation.x = Math.PI/2; obj.position.set((Math.random()-0.5)*10, 0.7, -150); scene.add(obj); (isCoin ? coinObjects : obstacles).push(obj);
            }
            [...obstacles, ...coinObjects].forEach((obj) => {
                obj.position.z += speed;
                if (player.position.distanceTo(obj.position) < 1.5) {
                    if (obstacles.includes(obj)) { 
                        gameActive = false; saveRun(); 
                        document.body.classList.add('paused-blur');
                        document.getElementById('gameover').classList.remove('hidden'); 
                        document.getElementById('pause-btn').style.display = 'none'; 
                    }
                    else { scene.remove(obj); coinObjects.splice(coinObjects.indexOf(obj), 1); coins++; score += 100; }
                }
                if (obj.position.z > 15) { scene.remove(obj); if(obstacles.includes(obj)) { obstacles.splice(obstacles.indexOf(obj), 1); score += 10; } else { coinObjects.splice(coinObjects.indexOf(obj), 1); } }
            });
            document.getElementById('score').innerText = score; document.getElementById('coins').innerText = coins; renderer.render(scene, camera);
        }

        function saveRun() {
            const runs = JSON.parse(localStorage.getItem('ketchup_best') || '[]');
            const now = new Date();
            runs.push({ score, date: now.toLocaleDateString('fi-FI'), time: now.toLocaleTimeString('fi-FI', {hour: '2-digit', minute:'2-digit'}) });
            runs.sort((a,b) => b.score - a.score);
            localStorage.setItem('ketchup_best', JSON.stringify(runs.slice(0, 50)));
        }

        window.updateSettings = () => {
            document.getElementById('score-ui').style.display = document.getElementById('score-toggle').checked ? 'inline' : 'none';
            targetFPS = document.getElementById('fps-limit').checked ? 60 : 1000;
        };

        window.addEventListener('touchstart', e => { 
            if (!gameActive || isPaused || e.target.closest('button') || e.target.closest('.back-arrow')) return; 
            if (e.touches[0].clientX < window.innerWidth/2) keys.left = true; else keys.right = true; 
        }, {passive: true});
        
        window.addEventListener('touchend', () => { keys.left = false; keys.right = false; }, {passive: true});
        
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
