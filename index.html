<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetchupGame</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-main: #e62e2e;
            --red-dark: #b31d1d;
            --red-light: #fff5f5;
            --text-main: #2d0a0a;
            --border-color: #ffcccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #ffffff;
            background-image: linear-gradient(var(--red-light) 2px, transparent 2px), 
                              linear-gradient(90deg, var(--red-light) 2px, transparent 2px);
            background-size: 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- TOPBAR --- */
        nav {
            width: 100%;
            height: 70px;
            background: #ffffff;
            border-bottom: 3px solid var(--red-main);
            display: flex;
            align-items: center;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .refresh-btn {
            background: none;
            border: 2px solid var(--red-main);
            color: var(--red-main);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: var(--red-main);
            color: white;
            transform: translateY(-1px);
        }

        /* --- CONTENT --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 10%;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 600;
            line-height: 1.2;
            color: var(--text-main);
            margin-bottom: 50px;
            max-width: 900px;
        }

        /* --- DOWNLOADS --- */
        .dl-wrap {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-box {
            text-decoration: none;
            width: 260px;
            background: white;
            padding: 35px 20px;
            border-radius: 30px;
            border: 3px solid var(--red-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 8px 8px 0px var(--red-main);
        }

        .download-box:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--red-dark);
        }

        .download-box:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--red-dark);
        }

        .platform {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 10px;
        }

        .btn-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--red-main);
        }

        /* Special style for Windows to make it "Pop" */
        .download-box.exe {
            background: var(--red-main);
        }
        .download-box.exe .btn-text { color: white; }
        .download-box.exe .platform { color: rgba(255,255,255,0.7); }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.6rem; }
            .download-box { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="refresh-btn" onclick="window.location.reload()">KETCHUPGAME</button>
    </nav>

    <main class="hero">
        <h1>Walk in a boring 2D world, host a world, or join a friends one.</h1>

        <div class="dl-wrap">
            <a href="https://drive.google.com/uc?export=download&id=1VwoXJYfd_XdTDV-ZhcxgNztpgeWkDO6U" target="_blank" class="download-box exe">
                <span class="platform">Desktop</span>
                <span class="btn-text">Download EXE</span>
            </a>

            <a href="https://drive.google.com/uc?export=download&id=124jTvRbnlAI-TnNQQu8bHSGiFxk9xwDU" target="_blank" class="download-box">
                <span class="platform">Apple</span>
                <span class="btn-text">Download DMG</span>
            </a>
        </div>
    </main>

</body>
</html>
