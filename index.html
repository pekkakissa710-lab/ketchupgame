<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker</title>
    <style>
        :root {
            --deep-red: #b30000;
            --bright-red: #ff0000;
            --sky-blue: #87CEEB;
            --cloud-white: #f0f8ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            /* Hieno liukuva taivas-efekti */
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Counterin tyyli */
        #ui {
            text-align: center;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        #counter {
            font-size: 8rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            text-shadow: 4px 4px 0px var(--deep-red);
            display: block;
        }

        #label {
            font-size: 1.5rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: bold;
        }

        /* Ketsuppipullo */
        .container {
            position: relative;
            perspective: 1000px;
        }

        #ketchup-btn {
            width: 280px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        #ketchup-btn:hover {
            transform: scale(1.05);
        }

        #ketchup-btn:active {
            transform: scale(0.9) rotate(-5deg);
        }

        /* Roiske-efekti */
        .splat {
            position: absolute;
            pointer-events: none;
            background: var(--bright-red);
            border-radius: 50%;
            animation: fly 0.6s ease-out forwards;
            z-index: 10;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="ui">
        <span id="label">Ketsuppia kerätty</span>
        <span id="counter">0</span>
    </div>

    <div class="container">
        <img src="ketchup.png" id="ketchup-btn" alt="Ketchup Bottle">
    </div>

    <script>
        let count = parseInt(localStorage.getItem('ketchupCount')) || 0;
        const counterDisplay = document.getElementById('counter');
        const btn = document.getElementById('ketchup-btn');

        // Päivitä näyttö heti alussa
        counterDisplay.innerText = count;

        btn.addEventListener('click', (e) => {
            count++;
            counterDisplay.innerText = count;
            localStorage.setItem('ketchupCount', count);

            // Luodaan roiskeita
            createSplats(e.clientX, e.clientY);
        });

        function createSplats(x, y) {
            for (let i = 0; i < 6; i++) {
                const splat = document.createElement('div');
                splat.classList.add('splat');
                
                // Arvotaan koko ja suunta
                const size = Math.random() * 15 + 5 + 'px';
                splat.style.width = size;
                splat.style.height = size;
                
                // Lasketaan satunnainen lentosuunta
                const moveX = (Math.random() - 0.5) * 300 + 'px';
                const moveY = (Math.random() - 0.5) * 300 + 'px';
                
                splat.style.setProperty('--x', moveX);
                splat.style.setProperty('--y', moveY);
                
                splat.style.left = x + 'px';
                splat.style.top = y + 'px';
                
                document.body.appendChild(splat);
                
                // Poistetaan elementti kun animaatio loppuu
                setTimeout(() => splat.remove(), 600);
            }
        }
    </script>
</body>
</html>
