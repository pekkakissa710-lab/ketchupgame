<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ketchup Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* Estetään kaikki selaimen oletustoiminnot */
        * { 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
            touch-action: none; /* Estää zoomailun ja skrollauksen pelatessa */
        }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Fredoka One', cursive; }
        
        /* PAUSE BLUR */
        .blur-target { transition: filter 0.3s ease; }
        .paused .blur-target { filter: blur(10px); }

        /* UI ELEMENTIT */
        .overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: white; background: rgba(255, 71, 71, 0.9);
            text-shadow: 3px 3px 0px #800000;
        }

        #pause-menu { display: none; background: rgba(0, 0, 0, 0.6); text-shadow: none; }

        h1 { font-size: clamp(40px, 10vw, 80px); margin-bottom: 20px; text-align: center; }
        .menu-btn { 
            font-size: 20px; padding: 15px 40px; margin: 10px;
            background: white; color: #ff4747; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 0px #ccc; font-family: 'Fredoka One';
        }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 24px; z-index: 5; display: none; 
        }

        #gameover { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: none; text-align: center; z-index: 20; color: white; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="game-container" class="blur-target"></div>

    <!-- MENU SCREEN -->
    <div id="menu" class="overlay">
        <h1>KETCHUP RUNNER</h1>
        <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="menu-btn" onclick="setDiff('Easy', this)">EASY</button>
            <button class="menu-btn" style="background: #ffd700;" onclick="setDiff('Medium', this)">MEDIUM</button>
            <button class="menu-btn" onclick="setDiff('Hard', this)">HARD</button>
            <button class="menu-btn" onclick="setDiff('Impossible', this)">IMPOSSIBLE</button>
        </div>
        <button class="menu-btn" style="background: #00ff00; color: #006400; font-size: 32px;" onclick="startGame()">PLAY!</button>
        <p style="font-size: 14px; text-shadow: none;">Controls: Tap Left/Right side or use Arrows/Esc</p>
    </div>

    <!-- PAUSE MENU -->
    <div id="pause-menu" class="overlay">
        <h1>PAUSED</h1>
        <button class="menu-btn" onclick="togglePause()">RESUME</button>
        <button class="menu-btn" onclick="location.reload()">QUIT</button>
    </div>

    <!-- GAME UI -->
    <div id="ui">SCORE: <span id="score">0</span> | COINS: <span id="coins">0</span></div>

    <div id="gameover">
        <h1>GAME OVER!</h1>
        <button class="menu-btn" onclick="location.reload()">MAIN MENU</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Estetään Ctrl-näppäinyhdistelmät
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && ['a','s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
        });

        let score = 0, coins = 0, gameActive = false, isPaused = false;
        let speed = 0.6, spawnRate = 0.04;
        const obstacles = [], coinObjects = [];
        const keys = { left: false, right: false };

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Cartoon Skybox
        const loader = new THREE.TextureLoader();
        scene.background = loader.load('https://img.freepik.com/free-vector/blue-sky-with-white-clouds-background_1017-23434.jpg');

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 15, 10);
        scene.add(sun);

        // ROAD (Autotie)
        const roadGroup = new THREE.Group();
        const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 1000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2;
        roadGroup.add(road);

        // Keskiviivat
        for (let i = 0; i < 50; i++) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.02, -i * 20);
            roadGroup.add(line);
        }
        scene.add(roadGroup);

        // PLAYER (Punainen laatikko)
        const player = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 0.6;
        scene.add(player);

        camera.position.set(0, 5, 9);
        camera.lookAt(player.position);

        // --- LOGIIKKA ---
        window.setDiff = (level, btn) => {
            document.querySelectorAll('.menu-btn').forEach(b => b.style.background = "white");
            btn.style.background = "#ffd700";
            if(level === 'Easy') { speed = 0.4; spawnRate = 0.02; }
            if(level === 'Medium') { speed = 0.6; spawnRate = 0.04; }
            if(level === 'Hard') { speed = 1.0; spawnRate = 0.08; }
            if(level === 'Impossible') { speed = 1.5; spawnRate = 0.15; }
        };

        window.startGame = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            gameActive = true;
            animate();
        };

        window.togglePause = () => {
            if (!gameActive) return;
            isPaused = !isPaused;
            document.body.classList.toggle('paused', isPaused);
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
        };

        // CONTROLS: KEYBOARD
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
            if (e.key === 'Escape') togglePause();
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
        });

        // CONTROLS: MOBILE (Screen Half Split)
        window.addEventListener('touchstart', e => {
            if (!gameActive || isPaused) return;
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) keys.left = true;
            else keys.right = true;
        });
        window.addEventListener('touchend', e => {
            if (e.touches.length === 0) { keys.left = false; keys.right = false; }
        });

        function spawn() {
            if (Math.random() < 0.25) { // Kolikko
                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.15,16), new THREE.MeshStandardMaterial({color: 0xffd700}));
                coin.rotation.x = Math.PI/2;
                coin.position.set((Math.random()-0.5)*10, 0.6, -150);
                scene.add(coin);
                coinObjects.push(coin);
            } else { // Este
                const obs = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xffdb00}));
                obs.position.set((Math.random()-0.5)*10, 0.75, -150);
                scene.add(obs);
                obstacles.push(obs);
            }
        }

        function animate() {
            if (!gameActive || isPaused) return;
            requestAnimationFrame(animate);

            // Liike
            if (keys.left && player.position.x > -5) player.position.x -= 0.2;
            if (keys.right && player.position.x < 5) player.position.x += 0.2;

            // Tien rullaaminen
            roadGroup.position.z += speed;
            if (roadGroup.position.z > 40) roadGroup.position.z = 0;

            if (Math.random() < spawnRate) spawn();

            // Esteiden käsittely
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += speed;
                if (player.position.distanceTo(obstacles[i].position) < 1.4) {
                    gameActive = false;
                    document.getElementById('gameover').style.display = 'block';
                }
                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score++;
                }
            }

            // Kolikoiden käsittely
            for (let i = coinObjects.length - 1; i >= 0; i--) {
                coinObjects[i].position.z += speed;
                coinObjects[i].rotation.y += 0.05;
                if (player.position.distanceTo(coinObjects[i].position) < 1.3) {
                    scene.remove(coinObjects[i]);
                    coinObjects.splice(i, 1);
                    coins++;
                    score += 50;
                } else if (coinObjects[i].position.z > 15) {
                    scene.remove(coinObjects[i]);
                    coinObjects.splice(i, 1);
                }
            }

            document.getElementById('score').innerText = score;
            document.getElementById('coins').innerText = coins;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
