<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetchupGame</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-main: #e62e2e;
            --red-dark: #b31d1d;
            --red-light: #fff5f5;
            --text-main: #2d0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #ffffff;
            background-image: linear-gradient(var(--red-light) 2px, transparent 2px), 
                              linear-gradient(90deg, var(--red-light) 2px, transparent 2px);
            background-size: 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            width: 100%;
            height: 70px;
            background: #ffffff;
            border-bottom: 3px solid var(--red-main);
            display: flex;
            align-items: center;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .refresh-btn {
            background: none;
            border: 2px solid var(--red-main);
            color: var(--red-main);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: var(--red-main);
            color: white;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 10%;
        }

        .hero h1 {
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 50px;
            max-width: 800px;
        }

        .ui-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .dl-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .box-btn {
            text-decoration: none;
            background: white;
            border-radius: 25px;
            border: 3px solid var(--red-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 8px 8px 0px var(--red-main);
        }

        .box-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--red-dark);
        }

        .box-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--red-dark);
        }

        .download-box {
            width: 280px;
            padding: 25px;
        }

        .browser-box {
            width: 580px;
            max-width: 100%;
            padding: 20px;
        }

        .platform-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 4px;
        }

        .main-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--red-main);
        }

        @media (max-width: 650px) {
            .hero h1 { font-size: 1.5rem; margin-bottom: 30px; }
            .dl-row { flex-direction: column; align-items: center; }
            .download-box, .browser-box { width: 90%; max-width: 320px; }
            nav { justify-content: center; padding: 0; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="refresh-btn" onclick="window.location.reload()">KETCHUPGAME</button>
    </nav>

    <main class="hero">
        <h1>Walk in a boring 2D world, host a world, or join a friends one.</h1>

        <div class="ui-wrap">
            <div class="dl-row">
                <a href="https://drive.google.com/uc?export=download&id=1VwoXJYfd_XdTDV-ZhcxgNztpgeWkDO6U" target="_blank" class="box-btn download-box">
                    <span class="platform-label">Desktop</span>
                    <span class="main-label">Download EXE</span>
                </a>

                <a href="https://drive.google.com/uc?export=download&id=124jTvRbnlAI-TnNQQu8bHSGiFxk9xwDU" target="_blank" class="box-btn download-box">
                    <span class="platform-label">Apple</span>
                    <span class="main-label">Download DMG</span>
                </a>
            </div>

            <a href="https://microstudio.io/GUGGU/ketchupgame/247WMPTF/" target="_blank" class="box-btn browser-box">
                <span class="main-label">Or play it in your browser</span>
            </a>
        </div>
    </main>

</body>
</html>
