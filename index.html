<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker</title>
    <link rel="icon" type="image/png" href="ketchup.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --deep-red: #b30000; --bright-red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
        
        body {
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: default;
        }

        #main-wrapper { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: filter 0.3s ease; }
        .blurred { filter: blur(15px); }

        /* Username Prompt */
        #name-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .name-box { background: white; padding: 2.5rem; border-radius: 20px; text-align: center; width: 350px; border: 5px solid var(--deep-red); }
        
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 2px solid #ddd; outline: none; font-size: 1.2rem; text-align: center; }
        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--bright-red); color: white; font-size: 1.1rem; text-transform: uppercase; }
        
        /* Game UI */
        #counter { font-size: 8rem; font-weight: 900; color: white; text-shadow: 4px 4px var(--deep-red); }
        #ketchup-btn { width: 280px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4)); }
        #ketchup-btn:active { transform: scale(0.9) rotate(-5deg); }
        #leaderboard { position: fixed; left: 20px; top: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 1rem; border-radius: 15px; color: white; width: 220px; border: 1px solid rgba(255,255,255,0.2); }
        #info { position: fixed; top: 20px; right: 20px; color: white; opacity: 0.6; font-weight: bold; }

        #delete-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 20px; z-index: 1100; text-align: center; border: 4px solid var(--deep-red); }
        .splat { position: absolute; pointer-events: none; background: var(--bright-red); border-radius: 50%; animation: fly 0.6s forwards; z-index: 10; }
        @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="name-screen">
        <div class="name-box">
            <h2 style="color: var(--deep-red)">CHOOSE USERNAME</h2>
            <input type="text" id="username-input" placeholder="Type name..." maxlength="15" autocomplete="off">
            <button class="action-btn" onclick="startGame()">Start Clicking</button>
        </div>
    </div>

    <div id="info">Right Shift = Reset</div>
    <div id="leaderboard">
        <h3 style="border-bottom: 2px solid var(--bright-red); margin-bottom: 10px; padding-bottom: 5px;">TOP 5 PLAYERS</h3>
        <div id="lb-list">Loading...</div>
    </div>

    <div id="main-wrapper">
        <div id="ui"><span id="counter">0</span></div>
        <img src="ketchup.png" id="ketchup-btn" alt="Ketchup">
    </div>

    <div id="delete-menu">
        <h3 style="margin-bottom:1rem;">Reset Everything?</h3>
        <button class="action-btn" onclick="resetData()">YES</button>
        <button class="action-btn" style="background:#888" onclick="closeMenu()">NO</button>
    </div>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = 'https://drjymjtukbirohklftsk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wO1HyTNhV4uwzC4Ng39Fng_dTRxzHSx';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let username = "";
        let count = 0;
        let isStarted = false;

        // --- START GAME ---
        async function startGame() {
            const input = document.getElementById('username-input').value.trim();
            if (!input) return alert("Enter a name!");
            
            username = input;
            
            // Haetaan vanha saldo jos nimi on jo käytetty
            const { data } = await supabaseClient
                .from('profiles')
                .select('ketchup_count')
                .eq('username', username)
                .single();
            
            if (data) {
                count = data.ketchup_count;
            } else {
                // Jos uusi nimi, luodaan se tietokantaan
                // HUOM: Tämä vaatii että id-sarake profiles-taulussa sallii nullin tai on generoitu
                // helpompi tapa tässä vaiheessa: tallenna vain nimi ja ketchupt
                await supabaseClient.from('profiles').insert([{ username: username, ketchup_count: 0 }]);
            }

            document.getElementById('counter').innerText = count;
            document.getElementById('name-screen').style.display = 'none';
            isStarted = true;
            updateLeaderboard();
            setInterval(saveToCloud, 5000);
        }

        // --- CLICKING ---
        document.getElementById('ketchup-btn').onclick = (e) => {
            if (!isStarted) return;
            count++;
            document.getElementById('counter').innerText = count;
            spawnSplat(e.clientX, e.clientY);
        };

        function spawnSplat(x, y) {
            for(let i=0; i<6; i++) {
                const s = document.createElement('div');
                s.className = 'splat';
                s.style.left = x + 'px'; s.style.top = y + 'px';
                s.style.width = s.style.height = (Math.random()*15+5)+'px';
                s.style.setProperty('--x', (Math.random()-0.5)*300+'px');
                s.style.setProperty('--y', (Math.random()-0.5)*300+'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 600);
            }
        }

        async function saveToCloud() {
            if (isStarted) {
                await supabaseClient.from('profiles').update({ ketchup_count: count }).eq('username', username);
                updateLeaderboard();
            }
        }

        async function updateLeaderboard() {
            const { data } = await supabaseClient.from('profiles').select('username, ketchup_count').order('ketchup_count', { ascending: false }).limit(5);
            if (data) {
                document.getElementById('lb-list').innerHTML = data.map((p, i) => 
                    `<div style="font-size:0.9rem; margin: 4px 0;">${i+1}. ${p.username}: ${p.ketchup_count}</div>`
                ).join('');
            }
        }

        // --- RESTRICTIONS ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.code === "ShiftRight") {
                document.getElementById('delete-menu').style.display = "block";
                document.getElementById('main-wrapper').classList.add('blurred');
            }
            if (e.keyCode === 27) closeMenu();
        });

        function closeMenu() {
            document.getElementById('delete-menu').style.display = "none";
            document.getElementById('main-wrapper').classList.remove('blurred');
        }

        async function resetData() {
            count = 0; document.getElementById('counter').innerText = 0;
            await saveToCloud(); closeMenu();
        }
    </script>
</body>
</html>
