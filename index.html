<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuppi Clicker</title>
    <link rel="icon" type="image/png" href="ketchup.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --deep-red: #b30000;
            --bright-red: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 50%, #9ad0ec 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            cursor: default;
        }

        /* Container for blurring effect */
        #main-wrapper {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: filter 0.3s ease;
        }

        .blurred {
            filter: blur(12px);
        }

        /* Auth Screen Styling */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            border: 6px solid var(--deep-red);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .auth-box h1 { color: var(--deep-red); margin-bottom: 1rem; font-size: 2rem; }
        
        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 0.5rem;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .primary-btn { background: var(--bright-red); color: white; margin-top: 1rem; }
        .secondary-btn { background: #eee; color: #333; font-size: 0.8rem; }

        /* Leaderboard & UI */
        #leaderboard {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 15px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 240px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #info-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #counter {
            font-size: 8rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            text-shadow: 4px 4px 0px var(--deep-red);
            display: block;
            margin-bottom: 10px;
        }

        #ketchup-btn {
            width: 280px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
        }

        #ketchup-btn:active {
            transform: scale(0.9) rotate(-5deg);
        }

        /* Delete/Reset Menu */
        #delete-menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            z-index: 1100;
            text-align: center;
            border: 5px solid var(--deep-red);
            width: 320px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }

        /* Splat animation */
        .splat {
            position: absolute;
            pointer-events: none;
            background: var(--bright-red);
            border-radius: 50%;
            animation: fly 0.6s ease-out forwards;
            z-index: 10;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1>KETCHUPPI</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="username" placeholder="Username (required for register)">
            <button class="primary-btn" onclick="handleAuth('login')">Login</button>
            <button class="secondary-btn" onclick="handleAuth('register')">Register New Account</button>
        </div>
    </div>

    <div id="info-overlay">Right Shift = Delete Data</div>

    <div id="leaderboard">
        <h3 style="margin-bottom: 12px; border-bottom: 2px solid var(--bright-red); padding-bottom: 5px;">GLOBAL TOP 5</h3>
        <div id="lb-list">Connecting...</div>
    </div>

    <div id="main-wrapper">
        <div id="ui">
            <span id="counter">0</span>
        </div>
        <div class="container">
            <img src="ketchup.png" id="ketchup-btn" alt="Ketchup Bottle">
        </div>
    </div>

    <div id="delete-menu">
        <h2 style="color: var(--deep-red); margin-bottom: 1.5rem;">Reset all stats?</h2>
        <button class="primary-btn" onclick="resetData()">Yes, Delete</button>
        <button class="secondary-btn" onclick="closeMenu()">Cancel</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://drjymjtukbirohklftsk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wO1HyTNhV4uwzC4Ng39Fng_dTRxzHSx';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let count = 0;
        const counterDisplay = document.getElementById('counter');
        const btn = document.getElementById('ketchup-btn');
        const wrapper = document.getElementById('main-wrapper');
        const deleteMenu = document.getElementById('delete-menu');

        // --- AUTHENTICATION ---
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            if (type === 'register') {
                if(!username) return alert("Please enter a username!");
                const { data, error } = await supabaseClient.auth.signUp({
                    email, password, options: { data: { username: username } }
                });
                if (error) return alert(error.message);
                alert("Account created! You can now login.");
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) return alert(error.message);
                currentUser = data.user;
                initGame();
            }
        }

        async function initGame() {
            // Get initial count
            const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) count = data.ketchup_count;
            
            counterDisplay.innerText = count;
            document.getElementById('auth-screen').style.display = 'none';
            
            updateLeaderboard();
            // Start auto-sync to cloud every 5 seconds
            setInterval(saveToCloud, 5000);
        }

        // --- GAMEPLAY ---
        btn.onclick = (e) => {
            if (!currentUser) return;
            count++;
            counterDisplay.innerText = count;
            createSplats(e.clientX, e.clientY);
        };

        async function saveToCloud() {
            if (!currentUser) return;
            await supabaseClient.from('profiles').update({ ketchup_count: count }).eq('id', currentUser.id);
            updateLeaderboard();
        }

        async function updateLeaderboard() {
            const { data } = await supabaseClient
                .from('profiles')
                .select('username, ketchup_count')
                .order('ketchup_count', { ascending: false })
                .limit(5);
            
            if (data) {
                document.getElementById('lb-list').innerHTML = data.map((p, i) => 
                    `<div style="padding: 4px 0; font-size: 0.95rem;">${i+1}. <b>${p.username || 'Anon'}</b>: ${p.ketchup_count}</div>`
                ).join('');
            }
        }

        function createSplats(x, y) {
            for (let i = 0; i < 8; i++) {
                const splat = document.createElement('div');
                splat.classList.add('splat');
                const size = Math.random() * 15 + 5 + 'px';
                splat.style.width = size; splat.style.height = size;
                const moveX = (Math.random() - 0.5) * 350 + 'px';
                const moveY = (Math.random() - 0.5) * 350 + 'px';
                splat.style.setProperty('--x', moveX); splat.style.setProperty('--y', moveY);
                splat.style.left = x + 'px'; splat.style.top = y + 'px';
                document.body.appendChild(splat);
                setTimeout(() => splat.remove(), 600);
            }
        }

        // --- SECURITY & MENUS ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        btn.ondragstart = () => false;

        document.addEventListener('keydown', (e) => {
            // Block generic shortcuts
            if (e.ctrlKey && (e.keyCode === 65 || e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83) || 
                e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
                e.preventDefault();
            }

            // Right Shift to show Delete menu
            if (e.code === "ShiftRight") {
                deleteMenu.style.display = "block";
                wrapper.classList.add('blurred');
            }
            if (e.keyCode === 27) closeMenu();
        });

        function closeMenu() {
            deleteMenu.style.display = "none";
            wrapper.classList.remove('blurred');
        }

        async function resetData() {
            count = 0;
            counterDisplay.innerText = 0;
            await saveToCloud();
            closeMenu();
        }
    </script>
</body>
</html>
